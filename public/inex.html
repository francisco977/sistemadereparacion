<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Reparaciones</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        form { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        input { display: block; margin: 10px 0; width: 100%; padding: 8px; }
        table { width: 100%; background: white; border-collapse: collapse; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        .btn-wsp { background: #25d366; color: white; padding: 5px 10px; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>Registro de Reparaciones</h2>
    <form id="formReparacion">
        <input type="text" id="nombre" placeholder="Nombre completo" required>
        <input type="text" id="telefono" placeholder="Número de teléfono (ej: 549381...)" required>
        <input type="text" id="articulo" placeholder="Artículo a reparar" required>
        <input type="number" id="precio" placeholder="Precio" required>
        <button type="submit">Guardar Registro</button>
    </form>

    <table>
        <thead>
            <tr>
                <th>Cliente</th>
                <th>Artículo</th>
                <th>Precio</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody id="tablaReparaciones"></tbody>
    </table>

    <script src="script.js"></script>
</body>
</html>
